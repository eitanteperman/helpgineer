<!DOCTYPE html>
<html>
<head>
  <title>HelpGineer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      background: #f5f7fa;
      color: #111;
    }

    .container {
      margin-top: 120px;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 16px;
    }

    p {
      font-size: 24px;
      margin-bottom: 32px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 22px;
      border: none;
      background: black;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Helpgineer</h1>
    <p>AI tools for engineering students</p>

    <div class="buttons">
      <button>Homework Solver</button>
      <button>Calculator</button>
      <button>Unit Converter</button>
    </div>
  </div>
</body>
</html>
